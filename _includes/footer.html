<footer class="site-footer">
  <div class="wrapper">
    <div class="footer-col-wrapper" style="display:flex; justify-content:space-between; gap:2rem; flex-wrap:wrap; align-items:flex-start;">

      <div class="footer-col footer-col-1">
        <p class="site-title" style="font-weight:700; margin-bottom:0.5rem;">
          {{ site.title | escape }}
        </p>
        <p class="footer-description" style="margin:0; font-size:0.85rem;">
          Análisis y comparativas de software B2B basados en ROI,
          viabilidad técnica y reducción de costes operativos.
        </p>
      </div>

      <div class="footer-col footer-col-2" style="display:flex; flex-direction:column; gap:0.5rem; align-items:flex-start;">
        <nav style="display:flex; flex-direction:column; gap:0.5rem;">
          <a href="{{ '/aviso-legal/' | relative_url }}">Aviso legal</a>
          <a href="{{ '/privacidad/' | relative_url }}">Privacidad y cookies</a>
          <a href="{{ '/afiliacion/' | relative_url }}">Divulgación de afiliados</a>
        </nav>
        <p class="footer-copy" style="margin-top:1rem; font-size:0.8rem; color:var(--text-muted);">
          &copy; {{ site.time | date: "%Y" }} {{ site.title | escape }}.
          Todos los derechos reservados.
        </p>
      </div>

    </div>
  </div>
</footer>
