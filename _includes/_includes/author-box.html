<div class="author-box">
  <div class="author-avatar">
    {% if page.author_avatar %}
      <img src="{{ page.author_avatar | relative_url }}"
           alt="{{ page.author_name | default: site.author }}"
           width="56" height="56" loading="lazy">
    {% else %}
      <div class="author-avatar-placeholder" aria-hidden="true">
        {{ page.author_name | default: site.author | slice: 0, 2 | upcase }}
      </div>
    {% endif %}
  </div>
  <div class="author-meta">
    <p class="author-name">
      {{ page.author_name | default: site.author | escape }}
    </p>
    <p class="author-role">
      {{ page.author_role | default: site.author_role | escape }}
    </p>
    <p class="author-bio">
      {{ page.author_bio | default: site.author_bio | escape }}
    </p>
  </div>
</div>
