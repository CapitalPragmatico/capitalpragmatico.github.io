---
layout: default
---

<article class="post h-entry" itemscope itemtype="http://schema.org/BlogPosting">

  <!-- Barra de progreso de lectura -->
<style>
  #reading-progress {
    position: fixed;
    top: 0;
    left: 0;
    width: 0%;
    height: 3px;
    background: var(--accent);
    z-index: 9999;
    transition: width 80ms linear;
    transform-origin: left center;
    pointer-events: none;
  }
</style>

<div id="reading-progress" role="progressbar"
     aria-valuenow="0" aria-valuemin="0" aria-valuemax="100"
     aria-label="Progreso de lectura del artículo"></div>

<script>
  (function () {
    var bar     = document.getElementById('reading-progress');
    var article = document.querySelector('.post-content');
    if (!bar || !article) return;

    function updateProgress() {
      var articleTop    = article.getBoundingClientRect().top + window.scrollY;
      var articleHeight = article.offsetHeight;
      var windowHeight  = window.innerHeight;
      var scrolled      = window.scrollY;

      var start    = articleTop;
      var end      = articleTop + articleHeight - windowHeight;
      var progress = end <= start ? 100 : ((scrolled - start) / (end - start)) * 100;
      var clamped  = Math.min(100, Math.max(0, progress));

      bar.style.width = clamped + '%';
      bar.setAttribute('aria-valuenow', Math.round(clamped));
    }

    window.addEventListener('scroll', updateProgress, { passive: true });
    window.addEventListener('resize', updateProgress, { passive: true });
    updateProgress();
  })();
</script>

  <header class="post-header">
    <h1 class="post-title p-name" itemprop="name headline">
      {{ page.title | escape }}
    </h1>
    <p class="post-meta">
      <time class="dt-published"
            datetime="{{ page.date | date_to_xmlschema }}"
            itemprop="datePublished">
        {{ page.date | date: "%d %b %Y" }}
      </time>
    </p>
  </header>

  {% include toc.html %}

  <div class="post-content e-content" itemprop="articleBody">
    {{ content }}
  </div>

  <footer class="post-footer">
    {% include author-box.html %}
    {% include related-posts.html %}
  </footer>

</article>
